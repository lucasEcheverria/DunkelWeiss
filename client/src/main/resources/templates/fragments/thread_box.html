<article class="dunkel-thread-box" th:fragment="box(thread)">
    <!-- Fixed route: thread controller listens on /threads/{id} -->
    <a th:href="@{/threads/{id}(id=${thread.id})}" style="text-decoration: none; color: inherit;">
    <header class="thread-header">
        <div class="thread-header-main">
            <h2 th:text="${thread.title}" class="thread-title">Título del Post</h2>

            <div class="thread-meta">
                <strong th:text="${thread.owner}" class="thread-author">Nombre de Usuario</strong>
                <span class="thread-time">abrió este hilo</span>
            </div>
        </div>

        <div class="thread-actions">
            <span class="badge-owner">Owner</span>
            <button class="btn-more" title="Opciones">•••</button>
        </div>
    </header>

    <div class="thread-body">
        <p th:text="${thread.description}">Esta es la descripción o el cuerpo del comentario del post.</p>
    </div>

    <footer class="thread-footer">
        <button class="btn-reaction" title="Añadir reacción">😊</button>
    </footer>
    </a>
</article>
