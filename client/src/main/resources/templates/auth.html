<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DunkelWeiss - Acceso</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>

    <style>
        /* Estilos específicos para centrar el login en medio de la pantalla */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px); /* 100vh menos el alto del navbar */
            margin-top: 60px;
            padding: 24px;
        }

        .auth-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .auth-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
        }

        .auth-form-group {
            margin-bottom: 18px;
        }

        .auth-form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .auth-input {
            width: 100%;
            height: 44px;
            background-color: var(--bg-surface-hover);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0 16px;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-input:focus {
            border-color: var(--brand-color);
            box-shadow: 0 0 0 1px var(--brand-color);
        }

        .btn-auth-submit {
            width: 100%;
            background-color: var(--brand-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
        }

        .btn-auth-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
        }

        /* Estilo para los mensajes de error usando tus variables */
        .error-box {
            background-color: rgba(255, 82, 82, 0.1);
            border-left: 4px solid var(--dislike-color);
            color: #ff5252;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body class="dark-theme">

<header class="dunkel-navbar">
    <div class="navbar-content">
        <div class="nav-left">
            <div class="brand-container" onclick="window.location.href='/home'">
                <span class="brand-logo">🕸️</span>
                <h1 class="brand-name">Dunkelweiss</h1>
            </div>
        </div>

        <div class="nav-right">
            <button class="btn btn-outline" id="toggle-btn" onclick="toggleMode()">
                Sign Up
            </button>

            <a th:href="@{/home}" class="btn icon-btn-ghost" style="text-decoration: none; font-size: 15px;">
                Volver
            </a>
        </div>
    </div>
</header>

<div class="auth-wrapper">
    <div class="auth-card">

        <div id="signin-section">
            <h2 class="auth-title">Iniciar Sesión</h2>

            <div class="error-box" th:if="${error}">
                Usuario o contraseña incorrectos.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="auth-form-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" name="email" class="auth-input"
                           placeholder="Tu correo electrónico" required/>
                </div>
                <div class="auth-form-group">
                    <label for="signin-password">Contraseña</label>
                    <input type="password" id="signin-password" name="password" class="auth-input"
                           placeholder="Tu contraseña" required/>
                </div>
                <button type="submit" class="btn-auth-submit">Entrar</button>
            </form>
        </div>

        <div id="signup-section" style="display:none;">
            <h2 class="auth-title">Crear Cuenta</h2>

            <div class="error-box" th:if="${error}">
                El email o nombre de usuario ya existe.
            </div>

            <form th:action="@{/register}" method="post">
                <div class="auth-form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" name="email" class="auth-input"
                           placeholder="tu@ejemplo.com" required/>
                </div>

                <div class="auth-form-group">
                    <label for="signup-username">Usuario</label>
                    <input type="text" id="signup-username" name="username" class="auth-input"
                           placeholder="Elige un nombre de usuario" required/>
                </div>
                <div class="auth-form-group">
                    <label for="signup-password">Contraseña</label>
                    <input type="password" id="signup-password" name="password" class="auth-input"
                           placeholder="Elige una contraseña segura" required/>
                </div>
                <button type="submit" class="btn-auth-submit">Registrarse</button>
            </form>
        </div>

    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const initialMode = urlParams.get('mode') || 'signin';
    if (initialMode === 'signup') {
        showSignup();
    }

    function toggleMode() {
        const signinSection = document.getElementById('signin-section');
        if (signinSection.style.display !== 'none') {
            showSignup();
        } else {
            showSignin();
        }
    }

    function showSignin() {
        document.getElementById('signin-section').style.display = 'block';
        document.getElementById('signup-section').style.display = 'none';
        document.getElementById('toggle-btn').textContent = 'Crear cuenta';
    }

    function showSignup() {
        document.getElementById('signin-section').style.display = 'none';
        document.getElementById('signup-section').style.display = 'block';
        document.getElementById('toggle-btn').textContent = 'Iniciar sesión';
    }
</script>
</body>
</html>
