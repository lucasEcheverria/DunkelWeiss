<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunkelweiss - Comunidad y Hilos</title>

    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
</head>
<body>

<script>
    if (localStorage.getItem('dunkel-theme') === 'light') {
        document.body.classList.add('light-theme');
    }
</script>

<header class="dunkel-navbar">
    <div class="navbar-content">
        <div class="nav-left">
            <button class="icon-btn-ghost">☰</button>
            <div class="brand-container">
                <span class="brand-logo">🕸️</span>
                <a th:href="@{/home}" style="text-decoration: none; color: inherit;">
                    <h1 class="brand-name">Dunkelweiss</h1>
                </a>
            </div>
        </div>

        <div class="nav-center">
            <form th:action="@{/threads/search}" method="GET" class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text"
                       name="query"
                       class="search-input"
                       placeholder="Buscar hilos, comunidades o usuarios..."
                       th:value="${param.query}"> <button type="submit" style="display: none;">Buscar</button>
            </form>
        </div>

        <div class="nav-right">
            <button id="theme-toggle" class="icon-btn-ghost" title="Cambiar tema">
                <span id="theme-icon">🌙</span>
            </button>

            <a th:if="${@authServiceProxy.getToken() == null}"
               th:href="@{/auth}"
               class="btn btn-outline"
               style="text-decoration: none; display: flex; align-items: center;">
                Log in
            </a>
            <a th:if="${@authServiceProxy.getToken() != null}"
               th:href="@{/logout}"
               class="btn btn-outline"
               style="text-decoration: none;">
                Logout
            </a>
            <a th:href="@{${@authServiceProxy.getToken() != null ? '/profile' : '/auth'}}"
               class="nav-avatar"
               style="text-decoration: none;">
                D
            </a>
        </div>
    </div>
</header>

<div class="web-layout">

    <aside class="left-panel">
        <nav class="side-menu">
            <a th:href="@{/home}" class="menu-item active">
                <span>↗️</span> Popular
            </a>
            <a th:href="@{${@authServiceProxy.getToken() != null ? '/threads/new' : '/auth'}}" class="menu-item">
                <span>+</span> Crear Hilo
            </a>
            <a th:href="@{${@authServiceProxy.getToken() != null ? '/communities/new' : '/auth'}}" class="menu-item"><span>🏘️</span> Crear Comunidad</a>


        </nav>
    </aside>

    <main class="center-feed">
        <div th:each="thread : ${threadFeedList}">
            <div th:replace="~{fragments/thread_box :: box(${thread})}"></div>
        </div>
    </main>

    <aside class="right-panel">

        <div class="dunkel-widget">
            <h3 class="widget-header-text">COMUNIDADES POPULARES</h3>
            <ul class="community-list">
                <th:block th:each="community : ${top5Communities}">
                    <li th:replace="~{fragments/popular_comunity :: box(${community})}"></li>
                </th:block>
            </ul>
        </div>

        <div class="dunkel-widget" th:if="${@authServiceProxy.getToken() != null}">
            <h3 class="widget-header-text">MIS COMUNIDADES</h3>
            <ul class="community-list">
                <th:block th:each="community : ${myCommunities}">
                    <li th:replace="~{fragments/popular_comunity :: box(${community})}"></li>
                </th:block>
            </ul>
        </div>

    </aside>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // Función que pone el sol o la luna según toque
        const updateIcon = () => {
            const isLight = document.body.classList.contains('light-theme');
            themeIcon.textContent = isLight ? '☀️' : '🌙';
        };

        // Poner el icono correcto nada más cargar la página
        updateIcon();

        // Qué pasa cuando haces clic
        themeToggleBtn.addEventListener('click', () => {
            // 1. Cambia el color
            document.body.classList.toggle('light-theme');

            // 2. Guarda tu elección en la memoria para las demás pestañas
            const isLightNow = document.body.classList.contains('light-theme');
            localStorage.setItem('dunkel-theme', isLightNow ? 'light' : 'dark');

            // 3. Cambia el icono
            updateIcon();
        });
    });
</script>

</body>
</html>
