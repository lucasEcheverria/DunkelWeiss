<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Perfil - DunkelWeiss</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            width: 420px;
        }
        h2 { margin-top: 0; }
        .row { margin-bottom: 12px; }
        label { display:block; font-size: 0.9rem; color: #333; margin-bottom: 6px; }
        input[type=text], input[type=password] {
            width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px;
        }
        .readonly { background: #fafafa; }
        button {
            background: #1a73e8; color: white; border: none; padding: 10px 14px; border-radius: 6px; cursor: pointer;
        }
        .muted { color: #666; font-size: 0.9rem; }
        .error { color: #b00020; margin-bottom: 12px; }
        .actions { display:flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="card">
    <h2>Perfil de usuario</h2>

    <div th:if="${param.error}">
        <div class="error">Ocurrió un error al procesar la solicitud.</div>
    </div>

    <div class="row">
        <label>Email</label>
        <input type="text" th:value="${user.email}" class="readonly" readonly />
    </div>

    <form action="/profile/update" method="post">
        <div class="row">
            <label>Nickname</label>
            <input type="text" name="nickname" th:value="${user.username}" />
        </div>

        <div class="row">
            <label>Nueva contraseña</label>
            <input type="password" name="password" placeholder="" />
        </div>

        <div class="actions">
            <div class="muted">ID: <span th:text="${user.id}"></span></div>
            <button type="submit">Save</button>
        </div>
    </form>

    <div style="margin-top:16px; text-align:right;">
        <a href="/home" class="muted">Back</a>
    </div>
</div>
</body>
</html>
