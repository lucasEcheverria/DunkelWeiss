<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunkelweiss - Comunidad y Hilos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header class="dunkel-navbar">
    <div class="navbar-content">
        <div class="nav-left">
            <button class="icon-btn-ghost">☰</button>
            <div class="brand-container">
                <span class="brand-logo">🕸️</span>
                <h1 class="brand-name">Dunkelweiss</h1>
            </div>
        </div>
        <div class="nav-center">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Buscar hilos, comunidades o usuarios...">
            </div>
        </div>
        <div class="nav-right">
            <button id="theme-toggle" class="icon-btn-ghost" title="Cambiar tema">🌓</button>
            <a href="/logout" class="btn btn-outline" style="text-decoration: none; display: flex; align-items: center;">Logout</a>
            <a th:href="@{/profile}" class="nav-avatar" style="text-decoration: none;">D</a>
        </div>
    </div>
</header>

<div class="web-layout">

    <aside class="left-panel">
        <nav class="side-menu">
            <a href="#" class="menu-item active"><span>↗️</span> Popular</a>
            <a th:href="@{/threads/new}" class="menu-item"><span>+</span> Crear Hilo</a>
            <a th:href="@{/communities/new}" class="menu-item"><span>🏘️</span> Crear Comunidad</a>
            <a href="#" class="menu-item"><span>🧭</span> Explorar</a>
            <hr class="separator">
            <p class="menu-label">RECURSOS</p>
            <a href="#" class="menu-item"><span>👽</span> Acerca de nosotros</a>
            <a href="#" class="menu-item"><span>📢</span> Anunciarse</a>
            <a href="#" class="menu-item"><span>⚖️</span> Política de privacidad</a>
        </nav>
    </aside>

    <main class="center-feed">
        <div th:each="thread : ${threadFeedList}">
            <div th:replace="~{fragments/thread_box :: box(${thread})}"></div>
        </div>
    </main>

    <aside class="right-panel">

        <div class="dunkel-widget">
            <h3 class="widget-header-text">COMUNIDADES POPULARES</h3>
            <ul class="community-list">
                <li th:each="community : ${top5Communities}">
                    <div class="comm-avatar" th:text="${#strings.substring(community.name(), 0, 1).toUpperCase()}"></div>
                    <div class="comm-info">
                        <strong th:text="'d/' + ${community.name()}"></strong>
                    </div>
                </li>
            </ul>
        </div>

        <div class="dunkel-widget">
            <h3 class="widget-header-text">ESTADO DEL SISTEMA</h3>
            <div class="status-list">
                <div class="status-item">
                    <span class="status-label"><span class="status-dot online"></span> Servidores Core</span>
                    <span class="status-text">En línea</span>
                </div>
                <div class="status-item">
                    <span class="status-label"><span class="status-dot online"></span> Base de Datos</span>
                    <span class="status-text">En línea</span>
                </div>
                <div class="status-item">
                    <span class="status-label"><span class="status-dot warning"></span> API Externa</span>
                    <span class="status-text">Latencia alta</span>
                </div>
            </div>
        </div>

    </aside>
</div>

<script>
    document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('light-theme');
</script>

</body>
</html>
